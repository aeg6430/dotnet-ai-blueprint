name: Validate Skeleton

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: .NET ${{ matrix.dotnet-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version:
          - 8.0.x
          - 9.0.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore skeleton solution
        run: dotnet restore skeleton/StarterPack.Skeleton.sln

      - name: Build skeleton solution
        run: dotnet build skeleton/StarterPack.Skeleton.sln -c Release --no-restore

      - name: Test skeleton solution
        run: dotnet test skeleton/StarterPack.Skeleton.sln -c Release --no-build
